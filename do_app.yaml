name: medora-ai
region: nyc
services:
- name: medora-web
  github:
    repo: TheTusharChopra/MedoraAI
    branch: main
    deploy_on_push: true
  dockerfile_path: Dockerfile
  http_port: 8000
  instance_count: 1
  instance_size_slug: basic-lg
  envs:
  - key: PORT
    value: "8000"
  - key: WORKERS
    value: "2"
  # Dependencies
  - key: SCM_DO_BUILD_DURING_DEPLOYMENT
    value: "true"
